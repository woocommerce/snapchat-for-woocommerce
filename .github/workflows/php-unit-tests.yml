name: PHPUnit Tests

on:
  push:
    branches:
      - trunk
      - develop
    paths:
      - "**.php"
      - composer.json
      - composer.lock
      - .github/workflows/php-unit-tests.yml
  pull_request:
    paths:
      - "**.php"
      - composer.json
      - composer.lock
      - .github/workflows/php-unit-tests.yml

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [7.4, 8.0, 8.2, 8.3]

    env:
      WP_CORE_DIR: /tmp/wordpress
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      DB_NAME: wordpress_test
      DB_USER: root
      DB_PASS: root
      DB_HOST: 127.0.0.1
      WP_VERSION: latest
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, mysqli
          tools: composer, phpunit

      - name: Prepare MySQL
        uses: woocommerce/grow/prepare-mysql@actions-v2

      - name: Install svn (used for installing WP versions)
        run: sudo apt-get -y install subversion

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install WordPress test suite (with WooCommerce)
        run: |
          bash bin/install-wp-tests.sh $DB_NAME $DB_USER $DB_PASS $DB_HOST $WP_VERSION

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit
