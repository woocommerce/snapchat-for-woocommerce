name: 'Bump Versions'

# **What it does**: Checks out a release branch, bumps the version string in
#   snapchat-for-woocommerce.php, package.json, and readme.txt, then commits and pushes.
# **Why we have it**: Called by release.yml as the first step after the release branch is created,
#   so the version bump commit is visible in the release PR diff.

on:
  workflow_call:
    inputs:
      version:
        description: 'New version string (e.g. 3.7.0)'
        required: true
        type: string
      release_branch:
        description: 'Release branch to update (e.g. release/3.7.0)'
        required: false
        type: string

jobs:
  bump:
    name: Bump version to ${{ inputs.version }}
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: ${{ inputs.release_branch != '' && inputs.release_branch || format('release/{0}', inputs.version) }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          token: ${{ secrets.ORG_DEPLOY_SECRET }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in snapchat-for-woocommerce.php
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PYEOF'
          import os
          import re

          version = os.environ["VERSION"]
          path = "snapchat-for-woocommerce.php"
          content = open(path, "r", encoding="utf-8").read()

          # Bump plugin header Version line.
          content, count = re.subn(
              r"(^\s*\*\s[Vv]ersion:\s*).*$",
              rf"\g<1>{version}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count == 0:
              raise SystemExit("Could not find plugin header Version line in snapchat-for-woocommerce.php")

          # Bump version constants using WRCS markers.
          content, marker_count = re.subn(
              r"('[0-9]+\.[0-9]+\.[0-9]+-?([a-z]+)?\.?[0-9]*'\s*\);\s*//\s*WRCS:\s*DEFINED_VERSION\.)",
              lambda m: f"'{version}' ); // WRCS: DEFINED_VERSION.",
              content,
              count=1,
          )

          if marker_count == 0:
              raise SystemExit("Could not find WRCS marker-based version constant in snapchat-for-woocommerce.php")

          open(path, "w", encoding="utf-8").write(content)
          PYEOF

      - name: Bump version in package.json
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

      - name: Bump version in package-lock.json
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
            lock.version = process.env.VERSION;
            if (lock.packages && lock.packages['']) {
              lock.packages[''].version = process.env.VERSION;
            }
            fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, '\t') + '\n');
          "

      - name: Bump stable tag in readme.txt
        env:
          VERSION: ${{ inputs.version }}
        run: 'sed -i "s/^Stable tag: .*/Stable tag: ${VERSION}/" readme.txt'

      - name: Commit and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add snapchat-for-woocommerce.php package.json package-lock.json readme.txt
          git commit -m "Release: Bump version to ${VERSION}."
          git push origin "${RELEASE_BRANCH}"
