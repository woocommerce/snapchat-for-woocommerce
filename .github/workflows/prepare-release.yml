name: 'Prepare Release'
run-name: 'Prepare Release ${{ github.event.inputs.version }} from ${{ github.event.inputs.source_branch }} by @${{ github.actor }}'

# **What it does**: Orchestrates release preparation only:
#   1. Creates a release/x.x.x branch from a caller-selected source branch.
#   2. Bumps version strings (bump-versions.yml).
#   3. Generates and commits changelog updates (generate-changelog.yml).
#   4. Opens a PR to trunk.
# **Why we have it**: To automate prep while keeping deployment as an explicit
# manual step in deploy.yml (simulate first, then final deploy).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.7.0)'
        required: true
        type: string
      source_branch:
        description: 'Source branch to create the release branch from (e.g., develop, trunk)'
        required: false
        default: 'develop'
        type: string

jobs:
  create-branch:
    name: Create release branch
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Use X.Y.Z (e.g., 3.7.0)"
            exit 1
          fi

      - name: Validate source branch exists
        env:
          GH_TOKEN: ${{ secrets.ORG_DEPLOY_SECRET }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
        run: |
          ENCODED_BRANCH="$(python3 - <<'PYEOF'
          import os
          from urllib.parse import quote
          print(quote(os.environ["SOURCE_BRANCH"], safe=""))
          PYEOF
          )"
          if ! gh api "repos/${{ github.repository }}/branches/${ENCODED_BRANCH}" --silent 2>/dev/null; then
            echo "::error::Source branch '${SOURCE_BRANCH}' does not exist."
            exit 1
          fi

      - name: Check release branch does not already exist
        env:
          GH_TOKEN: ${{ secrets.ORG_DEPLOY_SECRET }}
        run: |
          if gh api "repos/${{ github.repository }}/branches/release%2F${{ inputs.version }}" --silent 2>/dev/null; then
            echo "::error::Branch release/${{ inputs.version }} already exists."
            exit 1
          fi

      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          token: ${{ secrets.ORG_DEPLOY_SECRET }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push release branch
        run: |
          git checkout -b release/${{ inputs.version }}
          git push origin release/${{ inputs.version }}

  bump-versions:
    name: Bump versions
    needs: create-branch
    uses: ./.github/workflows/bump-versions.yml
    with:
      version: ${{ inputs.version }}
      release_branch: release/${{ inputs.version }}
    secrets: inherit

  generate-changelog:
    name: Generate changelog
    needs: bump-versions
    uses: ./.github/workflows/generate-changelog.yml
    with:
      version: ${{ inputs.version }}
      release_branch: release/${{ inputs.version }}
    secrets: inherit

  create-pr:
    name: Create Pull Request
    needs: generate-changelog
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          CHANGELOG_BLOCK: ${{ needs.generate-changelog.outputs.changelog_block }}
        with:
          script: |
            const version = process.env.VERSION;
            const sourceBranch = process.env.SOURCE_BRANCH;
            const changelog = process.env.CHANGELOG_BLOCK.trim();

            const body = [
              `## Release ${version}`,
              '',
              `> This release branch was created from \`${sourceBranch}\`.`,
              '> Deployment is manual: run `Deploy Product` (`deploy.yml`) in simulate mode first, then run final deploy after validation.',
              '',
              '### Changelog',
              '```',
              changelog,
              '```',
              '',
              '### Release Checklist',
              '',
              '- [ ] All CI checks pass',
              '- [ ] Run `Deploy Product` (`deploy.yml`) with `simulate=true` and validate logs/artifact',
              '- [ ] Smoke test the simulate build and apply any fixes on the release branch',
              '- [ ] Run `Deploy Product` (`deploy.yml`) with `simulate=false` for final deployment',
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release: ${version}`,
              head: `release/${version}`,
              base: 'trunk',
              body,
              draft: false,
            });

            core.notice(`Pull Request created: ${pr.html_url}`);
